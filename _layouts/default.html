<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title | escape }}</title>
  <style>
    :root {
      color-scheme: light;
      --text: #1f2933;
      --muted: #5d6b7a;
      --border: #d8dee4;
      --code-bg: #f6f8fa;
      --link: #0969da;
    }
    body {
      margin: 0;
      color: var(--text);
      font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }
    h1, h2, h3 {
      line-height: 1.25;
      margin: 1.5em 0 0.65em;
    }
    h1 {
      font-size: 2rem;
      padding-bottom: 0.35em;
      border-bottom: 1px solid var(--border);
    }
    h2 {
      font-size: 1.5rem;
      padding-bottom: 0.25em;
      border-bottom: 1px solid var(--border);
    }
    h3 {
      font-size: 1.2rem;
    }
    p, ul, ol, pre {
      margin: 0 0 1em;
    }
    a {
      color: var(--link);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    code {
      padding: 0.15em 0.35em;
      border-radius: 4px;
      background: var(--code-bg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92em;
    }
    pre {
      overflow: auto;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--code-bg);
    }
    pre code {
      padding: 0;
      background: transparent;
      font-size: 0.88rem;
    }
    blockquote {
      margin: 0 0 1em;
      padding-left: 1em;
      color: var(--muted);
      border-left: 4px solid var(--border);
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 0 0 1em;
    }
    th, td {
      padding: 8px 10px;
      border: 1px solid var(--border);
    }
    @media (max-width: 640px) {
      main {
        padding: 20px 16px 48px;
      }
      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
